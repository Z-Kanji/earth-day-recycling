  <body>
  <html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recycling Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Earth Day Recycling Game</h1>
<div id="timer">60</div>

<div class="game-container">

  <!-- BINS -->
  <div class="bins">
    <div class="bin" data-type="paper">
      <img src="bluebin.png">
      <p>Paper</p>
    </div>

    <div class="bin" data-type="glass">
      <img src="greenbin.png">
      <p>Glass</p>
    </div>

    <div class="bin" data-type="metal">
      <img src="redbin.png">
      <p>Metal</p>
    </div>

    <div class="bin" data-type="plastic">
      <img src="yellowbin.png">
      <p>Plastic</p>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="items" id="items"></div>

</div>

<div id="score">Score: 0</div>

<script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
